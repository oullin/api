name: Tests

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

jobs:
  test:
    if: github.event_name == 'pull_request' && (github.event.pull_request.draft == false ||
      (github.event.action == 'labeled' && contains(github.event.pull_request.labels.*.name, 'testing')))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.26.1]

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download Go modules
        run: go mod download

      - name: Run Shared Tests
        run: |
          go test -coverpkg=./... ./internal/shared/... -coverprofile=coverage-shared-${{ matrix.go-version }}.out
          go tool cover -func=coverage-shared-${{ matrix.go-version }}.out | tail -n 1

      - name: Run App Tests
        run: |
          go test -coverpkg=./... ./internal/app/... -coverprofile=coverage-app-${{ matrix.go-version }}.out
          go tool cover -func=coverage-app-${{ matrix.go-version }}.out | tail -n 1

      - name: Run Feature Tests
        run: |
          go test -coverpkg=./... ./internal/accounts ./internal/posts ./internal/projects ./internal/profile ./internal/links ./internal/talks ./internal/education ./internal/experience ./internal/recommendations ./internal/health ./internal/categories ./internal/signatures ./internal/metrics ./internal/seo -coverprofile=coverage-features-${{ matrix.go-version }}.out
          go tool cover -func=coverage-features-${{ matrix.go-version }}.out | tail -n 1

      - name: Run database tests
        run: |
          go test -coverpkg=./... ./database/... -coverprofile=coverage-database-${{ matrix.go-version }}.out
          go tool cover -func=coverage-database-${{ matrix.go-version }}.out | tail -n 1

      - name: Smoke Build Binaries
        run: |
          go build ./cmd/api ./cmd/admin ./cmd/dbseed ./cmd/dbimport

      - name: Merge coverage reports
        run: |
          echo "mode: set" > coverage-${{ matrix.go-version }}.out
          tail -q -n +2 coverage-*-${{ matrix.go-version }}.out >> coverage-${{ matrix.go-version }}.out
          go tool cover -func=coverage-${{ matrix.go-version }}.out | tail -n 1
